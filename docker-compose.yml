version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: coffee_shop
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - coffee-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - coffee-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    ports:
      - "3005:3005"
    env_file: .env
    environment:
      DATABASE_URL: postgres://postgres:password@postgres:5432/coffee_shop
      REDIS_URL: redis://redis-cache:6379
      NODE_ENV: development
      PORT: 3005
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
    networks:
      - coffee-network
    command: npm run dev

volumes:
  postgres_data:
  redis_data:

networks:
  coffee-network:
    driver: bridge